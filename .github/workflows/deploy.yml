name: Deploy to Fly

# Auto-deploys both Fly apps on every push to main.
# Requires FLY_API_TOKEN in repo Secrets (Settings → Secrets → Actions → New secret).
# Generate one locally with: fly auth token

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  # Cancel in-progress deploys for the same branch — only the latest commit
  # should ship. Skip cancelling if "deploy-in-progress" matters for you.
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --config fly.api.toml --remote-only
        working-directory: agent-support-platform
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-dashboard:
    name: Deploy dashboard
    runs-on: ubuntu-latest
    # Wait for the API to land before the dashboard — keeps the
    # NEXT_PUBLIC_API_URL build-time inline target in lockstep.
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --config fly.dashboard.toml --remote-only
        working-directory: agent-support-platform
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
