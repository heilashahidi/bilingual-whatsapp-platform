version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: asp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: asp_user
      POSTGRES_PASSWORD: asp_dev_password
      POSTGRES_DB: agent_support
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: asp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
