# Fly.io config for the dashboard.
# First time:  fly launch --config fly.dashboard.toml --copy-config --no-deploy
# Subsequent:  fly deploy --config fly.dashboard.toml \
#                --build-arg NEXT_PUBLIC_API_URL=https://<api-app>.fly.dev
#
# NEXT_PUBLIC_API_URL is inlined at build time, so whenever the API URL
# changes the dashboard needs to be redeployed.

app = "REPLACE_ME"
primary_region = "iad"

[build]
  dockerfile = "apps/dashboard/Dockerfile"
  # Default build arg; override per-deploy with --build-arg
  [build.args]
    NEXT_PUBLIC_API_URL = "http://localhost:3001"

[env]
  NODE_ENV = "production"
  HOSTNAME = "0.0.0.0"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  # Dashboard can scale to zero when idle — Fly will boot it on the next request.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
