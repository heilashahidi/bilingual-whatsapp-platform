# fly.toml app configuration file generated for asp-dashboard-heila on 2026-05-22T09:11:03-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'asp-dashboard-heila'
primary_region = 'iad'

[build]
  dockerfile = 'apps/dashboard/Dockerfile'

  [build.args]
    NEXT_PUBLIC_API_URL = 'https://heilashahidi.fly.dev'

[env]
  HOSTNAME = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
