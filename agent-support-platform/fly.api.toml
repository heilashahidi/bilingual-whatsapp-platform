# Fly.io config for the API service.
# First time:  fly launch --config fly.api.toml --copy-config --no-deploy
# Subsequent:  fly deploy --config fly.api.toml
#
# After `fly launch` assigns the app name, replace REPLACE_ME below.

app = "heilashahidi"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  # The API hosts Socket.IO in-process. Events emitted from one machine
  # don't reach clients connected to another machine without a Redis
  # pub/sub adapter — which we deliberately don't run today (premature
  # for a 1k-agent workload). So this app must stay pinned to ONE
  # machine until we wire up @socket.io/redis-adapter (Upstash Redis
  # is already provisioned for that). If you scale up via
  # `fly scale count`, expect realtime notifications to silently drop
  # for ~half of dashboard users.
  #
  # See docs/ARCHITECTURE.md §"Realtime horizontal scaling" for the
  # full rationale and migration path.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
